<html>
  <head>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&family=Ultra&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="password-app">
      <h1 class="password-app__title">
        <span class="password-app__highlight">Generate a</span><br />
        random password
      </h1>

      <p class="password-app__subtitle">
        Never use an insecure password again.
      </p>

      <div class="password-app__options-container">
        <div class="password-app__option-card">
          <div class="password-app__length-btns-box">
            <button type="button" class="password-app__step-btn" id="minusBtn">
              -
            </button>
            <input
              class="password-app__input"
              id="inputLength"
              type="number"
              value="15"
              min="1"
              max="18"
              readonly
            />
            <button type="button" class="password-app__step-btn" id="plusBtn">
              +
            </button>
          </div>
          <label for="inputLength" class="password-app__label">length</label>
        </div>
        <div class="password-app__option-card">
          <label class="toggle-btn" for="letters-toggle"
            ><input
              type="checkbox"
              class="checkbox-hidden"
              id="letters-toggle"
              checked /><span class="toggle-text"></span
          ></label>
          <label for="letters-toggle" class="password-app__label"
            >letters</label
          >
        </div>
        <div class="password-app__option-card">
          <label class="toggle-btn" for="numbers-toggle"
            ><input
              type="checkbox"
              class="checkbox-hidden"
              id="numbers-toggle"
              checked /><span class="toggle-text"></span
          ></label>
          <label for="numbers-toggle" class="password-app__label"
            >numbers</label
          >
        </div>
        <div class="password-app__option-card">
          <label class="toggle-btn" for="symbols-toggle"
            ><input
              type="checkbox"
              class="checkbox-hidden"
              id="symbols-toggle"
              checked /><span class="toggle-text"></span
          ></label>
          <label for="symbols-toggle" class="password-app__label"
            >symbols</label
          >
        </div>
      </div>

      <p class="alert-message" id="emptyOptionsMsg"></p>

      <button class="password-app__generate-btn" id="generateButton">
        Generate passwords
      </button>

      <hr class="password-app__separator" />

      <div class="password-app__results">
        <p>Click text to copy to clipboard.</p>
        <div class="password-app__result-cards-container">
          <div class="password-app__result-card">
            <p class="password-app__output" id="passwordOutput1"></p>
          </div>
          <div class="password-app__result-card">
            <p class="password-app__output" id="passwordOutput2"></p>
          </div>
        </div>
        <p class="alert-message" id="copiedMessage"></p>
      </div>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
